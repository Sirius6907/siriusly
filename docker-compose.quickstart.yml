services:
  sirius-eco-system:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SIRIUSLY_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      SIRIUSLY_HOME: "/sirius-eco-system"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      SIRIUSLY_DEPLOYMENT_MODE: "authenticated"
      SIRIUSLY_DEPLOYMENT_EXPOSURE: "private"
      SIRIUSLY_PUBLIC_URL: "${SIRIUSLY_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${SIRIUSLY_DATA_DIR:-./data/docker-sirius-eco-system}:/sirius-eco-system"
