services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sirius-eco-system
      POSTGRES_PASSWORD: sirius-eco-system
      POSTGRES_DB: sirius-eco-system
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sirius-eco-system -d sirius-eco-system"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://sirius-eco-system:sirius-eco-system@db:5432/sirius-eco-system
      PORT: "3100"
      SERVE_UI: "true"
      SIRIUSLY_DEPLOYMENT_MODE: "authenticated"
      SIRIUSLY_DEPLOYMENT_EXPOSURE: "private"
      SIRIUSLY_PUBLIC_URL: "${SIRIUSLY_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - sirius-eco-system-data:/sirius-eco-system
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  sirius-eco-system-data:
